# =============================================================================
# News entries — edit this file to add/update news. No code changes needed.
#
# To ADD a news item: copy a block below and fill in `date` and `html`.
#   - `date`: the date label shown on the left (e.g. "09/2025")
#   - `html`: the news text. Plain text is fine; HTML is allowed for links,
#             bold, colors, etc. Use the `|` block style as shown so you can
#             write multiple lines and use quotes/special characters freely.
#
# Entries appear on the page in the SAME ORDER they are listed here.
# To reorder, just move a block up or down.
#
# Handy snippets you can paste inside `html`:
#   accepted:  <span style="font-weight:bold;color:green">accepted to</span>
#   awarded:   <span style="font-weight:bold;color:#B8860B">awarded</span>
#   link:      <a href="https://example.com">link text</a>
# =============================================================================

