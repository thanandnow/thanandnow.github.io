- project: "Low-cost Terrain Navigation for Education in End-to-End Robotics"
  mentee: "Laura Wang, Caleb Hsu, Byron Boots, Tyler Han"
  role: "CSE 494 capstone project, University of Washington, 2026"
  image: /images/depth-elev-teaser.png
  description: |
