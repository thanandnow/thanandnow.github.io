- project: "Wheeled Lab"
  role: "University of Washington, February 2025 - present"
  image: /images/wl-teaser.gif
  stars: UWRobotLearning/WheeledLab
  description: |
    Created an open-source education platform for students new to reinforcement
    learning in robotics, and advise undergraduate teams beginning in robotics by
    mentoring extracurricular Sim2Real projects.
    <br><br>
    If you're interested in RL and robotics but don't know where to start, consider starting with us!
    There are currently 12 students with self-driven Sim2Real projects spanning pre-trained encoders, Real2Sim, depth-based Sim2Real, high-performance visual racing, and more!
  links:
    - title: website
      url: https://uwrobotlearning.github.io/WheeledLab/